<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資監控儀表板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --bg:#070b14;--card:#111927;--border:rgba(255,255,255,0.07);
  --gold:#f5a623;--gold2:#ffd280;--green:#00e5a0;--green2:#00ffb3;
  --red:#ff4d6d;--yellow:#ffd60a;--blue:#4dabf7;--purple:#b197fc;
  --text:#e8eef6;--muted:#6b7f99;
  --mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(245,166,35,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,166,35,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1;}

/* Header */
.hdr{text-align:center;padding:28px 0 22px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.htag{font-family:var(--mono);font-size:11px;letter-spacing:4px;color:var(--gold);
  background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);
  padding:4px 14px;display:inline-block;margin-bottom:12px;}
.h1{font-size:clamp(22px,6vw,38px);font-weight:900;letter-spacing:-1px;}
.h1 s{color:var(--gold);font-style:normal;}
.hsub{margin-top:8px;font-size:12px;color:var(--muted);letter-spacing:1px;}

/* 更新欄 */
.ubar{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:8px;margin-bottom:16px;font-family:var(--mono);font-size:11px;gap:8px;flex-wrap:wrap;}
.udot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rbtn{background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;}
.rbtn:hover{border-color:var(--gold);color:var(--gold);}

/* 主燈號卡 */
.scard{border-radius:12px;padding:20px;margin-bottom:14px;
  border:1px solid var(--border);position:relative;overflow:hidden;background:var(--card);}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sg::before{background:var(--green);}
.sy::before{background:var(--yellow);}
.sr::before{background:var(--red);}
.stop{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.semoji{font-size:32px;line-height:1;margin-bottom:5px;}
.stitle{font-size:clamp(14px,4vw,20px);font-weight:700;margin-bottom:3px;}
.saction{font-size:12px;color:var(--muted);}
.pbig{font-family:var(--mono);font-size:clamp(26px,7vw,40px);font-weight:700;color:var(--gold);line-height:1;}
.pchg{font-family:var(--mono);font-size:13px;margin-top:3px;}
.pchg.up{color:var(--red);}.pchg.dn{color:var(--green);}.pchg.fl{color:var(--muted);}
.plbl{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono);}

/* 回檔進度條 */
.ddlbls{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-family:var(--mono);}
.ddhigh{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);}
.ddhigh span{color:var(--gold);font-weight:700;}
.ddtrack{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.ddfill{height:100%;border-radius:4px;transition:width 1s ease;}
.ddmarks{display:flex;justify-content:space-between;margin-top:3px;}
.ddmark{font-size:10px;color:var(--muted);font-family:var(--mono);}

/* 共振評分 */
.ssec{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);
  display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.scircle{position:relative;width:76px;height:76px;flex-shrink:0;}
.scircle svg{transform:rotate(-90deg);}
.snum{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-family:var(--mono);
  font-size:16px;font-weight:700;line-height:1;}
.snum small{font-size:10px;color:var(--muted);}
.stags{flex:1;min-width:160px;}
.stagstitle{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.stag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;
  margin:2px 2px 2px 0;font-family:var(--mono);
  background:rgba(245,166,35,0.1);color:var(--gold);border:1px solid rgba(245,166,35,0.2);}

/* 格線 */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:500px){.g2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.ct{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
  margin-bottom:12px;font-family:var(--mono);}

/* 技術指標 */
.irow{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.irow:last-child{border-bottom:none;}
.iname{font-size:13px;color:var(--muted);}
.ival{font-family:var(--mono);font-size:13px;font-weight:700;}
.ibadge{font-size:10px;padding:2px 6px;border-radius:3px;font-family:var(--mono);}
.bok{background:rgba(0,229,160,0.12);color:var(--green);}
.bwarn{background:rgba(255,214,10,0.12);color:var(--yellow);}
.bdanger{background:rgba(255,77,109,0.12);color:var(--red);}

/* 歷史機率 */
.prow{margin-bottom:12px;}
.phdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.plbl2{color:var(--muted);}.ppct{font-family:var(--mono);font-weight:700;}
.ptrack{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;}

/* 子彈建議 */
.brows{display:flex;flex-direction:column;gap:7px;}
.brow{display:flex;align-items:center;gap:8px;padding:9px 10px;
  border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
.bptag{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;
  border-radius:3px;min-width:52px;text-align:center;flex-shrink:0;}
.bdesc{font-size:12px;color:var(--muted);line-height:1.4;}
.bact{border-color:rgba(245,166,35,0.3)!important;background:rgba(245,166,35,0.05)!important;}
.bact .bdesc{color:var(--text);}

/* Loading / Error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 20px;gap:12px;}
.lspin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:var(--mono);font-size:12px;color:var(--muted);}
.err{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.2);
  border-radius:10px;padding:20px;text-align:center;font-size:13px;line-height:1.8;color:var(--red);}

/* 閒置狀況 */
.itrack{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin:8px 0;}

/* 美股 */
.usgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:400px){.usgrid{grid-template-columns:repeat(2,1fr);}}
.usitem{background:rgba(255,255,255,0.03);border-radius:8px;padding:9px;border:1px solid var(--border);}
.usname{font-size:11px;color:var(--muted);margin-bottom:3px;}
.usval{font-family:var(--mono);font-size:14px;font-weight:700;}
.uschg{font-family:var(--mono);font-size:11px;margin-top:2px;}

.disc{text-align:center;font-size:11px;color:var(--muted);padding-top:20px;
  border-top:1px solid var(--border);margin-top:20px;line-height:1.8;}
.datasrc{text-align:center;font-size:10px;color:var(--muted);margin-bottom:14px;font-family:var(--mono);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="htag">INVESTMENT MONITOR</div>
    <div class="h1">投資監控 <s>儀表板</s></div>
    <div class="hsub">0050 · 多指標共振 · 加碼燈號</div>
  </div>

  <div class="ubar">
    <span id="utime" style="color:var(--muted)">載入中...</span>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="udot"></div>
        <span id="mstat" style="color:var(--muted)">連線中</span>
      </div>
      <button class="rbtn" onclick="load()">↻ 更新</button>
    </div>
  </div>

  <div id="main">
    <div class="loading">
      <div class="lspin"></div>
      <div class="ltxt">載入市場資料中...</div>
    </div>
  </div>

  <div class="disc">
    資料由 Discord Bot 每30分鐘更新一次<br>
    本儀表板僅供個人參考，非投資建議。技術指標不保證未來報酬。
  </div>
</div>

<script>
// ── 工具函式 ──
const fmtChg = v => v==null?'--':`${v>0?'+':''}${v.toFixed(2)}%`;
const chgCls = v => v>0?'up':v<0?'dn':'fl';
const chgColor = v => v>0?'var(--red)':v<0?'var(--green)':'var(--muted)';

function signal(light){
  if(light==='🔴') return 'sr';
  if(light==='🟡') return 'sy';
  return 'sg';
}

// ── 渲染 ──
function render(d){
  const e = d.etf_0050;
  const dd = e.drawdown;
  const ddAbs = Math.min(Math.abs(dd)/25*100,100);
  const ddColor = dd<=-20?'var(--red)':dd<=-8?'var(--yellow)':'var(--green)';
  const scColor = e.score>=70?'var(--red)':e.score>=45?'var(--yellow)':'var(--green)';
  const circ = 2*Math.PI*32;
  const us = d.us||{};
  const idle = d.idle||{months:0,emoji:'🟢',advice:'繼續等待，保留子彈',last_date:'--'};
  const prob = e.hist_prob;
  const pred = e.pred||{score:0,emoji:'🟢',level:'極低',range:'--',advice:'--',signals:[]};

  const bullets = [
    {range:'正常 ~ -5%', action:'留著累積，不追高',        pct:null,  active:dd>-5},
    {range:'-5% ~ -8%',  action:'子彈待命，注意觀察',       pct:null,  active:dd<=-5&&dd>-8},
    {range:'-8% 觸發',   action:'動用 30% 子彈加碼',        pct:'30%', active:dd<=-8&&dd>-15},
    {range:'-15% 觸發',  action:'動用 70% 子彈加碼',        pct:'70%', active:dd<=-15&&dd>-20},
    {range:'-20%+ 觸發', action:'動用 100% 子彈，全力加碼', pct:'100%',active:dd<=-20},
  ];
  const ptc={'30%':'var(--yellow)','70%':'var(--gold)','100%':'var(--red)'};

  // 美股預判文字
  let usLines=[];
  if(us.spy_chg!=null){
    if(us.spy_chg<=-2) usLines.push(`⚠️ 美股昨大跌 ${us.spy_chg.toFixed(1)}%，台股今日可能承壓`);
    else if(us.spy_chg>=2) usLines.push(`✅ 美股昨大漲 ${us.spy_chg.toFixed(1)}%，台股今日偏多`);
    else usLines.push(`😐 美股昨小幅 ${(us.spy_chg>0?'+':'')+us.spy_chg.toFixed(1)}%，影響有限`);
  }
  if(us.sox_chg!=null){
    if(us.sox_chg<=-3) usLines.push(`⚠️ 費半昨跌 ${us.sox_chg.toFixed(1)}%，半導體族群留意`);
    else if(us.sox_chg>=3) usLines.push(`✅ 費半昨漲 ${us.sox_chg.toFixed(1)}%，半導體偏多`);
  }
  if(us.vix!=null){
    if(us.vix>30) usLines.push(`😱 VIX ${us.vix.toFixed(1)}｜極度恐慌，往往是好買點`);
    else if(us.vix>20) usLines.push(`⚠️ VIX ${us.vix.toFixed(1)}｜市場情緒緊張`);
    else usLines.push(`😊 VIX ${us.vix.toFixed(1)}｜市場情緒穩定`);
  }

  const idleBar = Math.min(idle.months/12*100,100);
  const idleColor = idle.months>=12?'var(--red)':idle.months>=6?'var(--yellow)':'var(--green)';

  document.getElementById('main').innerHTML = `
    <div class="datasrc">資料由 Bot 於 ${d.updated?new Date(d.updated).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'--'} 更新</div>

    <!-- 主燈號卡 -->
    <div class="scard ${signal(e.light)}">
      <div class="stop">
        <div>
          <div class="semoji">${e.light}</div>
          <div class="stitle">${e.title}</div>
          <div class="saction">${e.action}</div>
        </div>
        <div style="text-align:right">
          <div class="pbig">${e.price.toFixed(2)}</div>
          <div class="pchg ${chgCls(e.chg)}">${fmtChg(e.chg)}</div>
          <div class="plbl">${e.label} · 0050</div>
          ${d.twii?.price?`<div class="plbl" style="margin-top:4px">大盤 ${d.twii.price.toLocaleString()} (${fmtChg(d.twii.chg)})</div>`:''}
        </div>
      </div>

      <div class="ddlbls"><span>距近期高點回檔</span><span style="color:${ddColor};font-weight:700">${dd.toFixed(2)}%</span></div>
      <div class="ddhigh">近期高點：<span>${e.high60.toFixed(2)} 元</span> ｜ ${e.high60_date||'--'} ｜ 距今 <span>${e.high60_days}</span> 個交易日</div>
      <div class="ddtrack"><div class="ddfill" style="width:${ddAbs}%;background:${ddColor}"></div></div>
      <div class="ddmarks">
        <span class="ddmark">0%</span>
        <span class="ddmark" style="color:var(--yellow)">-8%</span>
        <span class="ddmark" style="color:var(--gold)">-15%</span>
        <span class="ddmark" style="color:var(--red)">-20%</span>
        <span class="ddmark">-25%</span>
      </div>

      <div class="ssec">
        <div class="scircle">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
            <circle cx="38" cy="38" r="32" fill="none" stroke="${scColor}" stroke-width="6"
              stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-e.score/100)}" stroke-linecap="round"/>
          </svg>
          <div class="snum">${e.score}<small>/100</small></div>
        </div>
        <div class="stags">
          <div class="stagstitle">共振評分依據</div>
          ${e.signals?.length?e.signals.map(s=>`<span class="stag">${s}</span>`).join(''):'<span style="color:var(--muted);font-size:12px">無顯著訊號</span>'}
        </div>
      </div>
    </div>

    <!-- 技術指標 + 歷史機率 -->
    <div class="g2">
      <div class="card">
        <div class="ct">🔬 技術指標</div>
        <div class="irow">
          <span class="iname">RSI (14)</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="ival" style="color:${e.rsi<30?'var(--green)':e.rsi>70?'var(--red)':'var(--text)'}">${e.rsi.toFixed(1)}</span>
            <span class="ibadge ${e.rsi<30?'bok':e.rsi>70?'bdanger':'bok'}">${e.rsi<30?'超賣':e.rsi>70?'超買':'正常'}</span>
          </div>
        </div>
        <div class="irow"><span class="iname">乖離率 20日</span><span class="ival" style="color:${e.bias20<-3?'var(--green)':e.bias20>3?'var(--red)':'var(--text)'}">${(e.bias20>0?'+':'')+e.bias20.toFixed(2)}%</span></div>
        <div class="irow"><span class="iname">乖離率 60日</span><span class="ival" style="color:${e.bias60<-3?'var(--green)':e.bias60>3?'var(--red)':'var(--text)'}">${(e.bias60>0?'+':'')+e.bias60.toFixed(2)}%</span></div>
        <div class="irow">
          <span class="iname">MA20</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="ival">${e.ma20.toFixed(2)}</span>
            <span class="ibadge ${e.above_ma20?'bok':'bdanger'}">${e.above_ma20?'上方':'下方'}</span>
          </div>
        </div>
        <div class="irow">
          <span class="iname">MA60</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="ival">${e.ma60.toFixed(2)}</span>
            <span class="ibadge ${e.above_ma60?'bok':'bdanger'}">${e.above_ma60?'上方':'下方'}</span>
          </div>
        </div>
        <div class="irow"><span class="iname">MACD</span><span class="ival" style="color:${e.macd_hist>0?'var(--green)':'var(--red)'}">${e.macd_hist>0?'↗ 翻正':'↘ 負值'}</span></div>
      </div>

      <div class="card">
        <div class="ct">📜 歷史回檔機率</div>
        ${prob?`
          <div style="margin-bottom:14px;padding:9px;background:rgba(245,166,35,0.06);border-radius:7px;border:1px solid rgba(245,166,35,0.15)">
            <div style="font-size:11px;color:var(--gold);margin-bottom:3px;font-family:var(--mono)">觸發：跌超 ${prob.thresh}% 門檻</div>
            <div style="font-size:12px;color:var(--muted);line-height:1.9">
              歷史共 <b style="color:var(--text)">${prob.count}</b> 次<br>
              ${prob.days}日內回前高：<b style="color:var(--green)">${prob.rec}/${prob.count}次（${prob.pct}%）</b>
            </div>
          </div>
          <div class="prow">
            <div class="phdr"><span class="plbl2">平均反彈</span><span class="ppct" style="color:var(--green)">+${prob.bounce}%</span></div>
            <div class="ptrack"><div class="pfill" style="width:${Math.min(prob.bounce/50*100,100)}%;background:var(--green)"></div></div>
          </div>
          <div class="prow">
            <div class="phdr"><span class="plbl2">最大繼跌</span><span class="ppct" style="color:var(--red)">-${prob.maxdrop}%</span></div>
            <div class="ptrack"><div class="pfill" style="width:${Math.min(prob.maxdrop/50*100,100)}%;background:var(--red)"></div></div>
          </div>`
        :`<div style="color:var(--muted);font-size:13px;text-align:center;padding:28px 0">
            目前回檔未達 8% 門檻<br>
            <span style="font-size:11px">持續定額，無需特別行動</span>
          </div>`}
      </div>
    </div>

    <!-- 美股 + 子彈建議 -->
    <div class="g2">
      <div class="card">
        <div class="ct">🌏 美股→台股預判</div>
        <div class="usgrid">
          ${[['SPY',us.spy_chg],['QQQ',us.qqq_chg],['VIX',null,us.vix],['費半',us.sox_chg]].map(([n,chg,price])=>`
          <div class="usitem">
            <div class="usname">${n}</div>
            <div class="usval">${price!=null?price.toFixed(1):chg!=null?(chg>0?'+':'')+chg.toFixed(2)+'%':'--'}</div>
            ${chg!=null?`<div class="uschg" style="color:${chgColor(chg)}">${fmtChg(chg)}</div>`:''}
          </div>`).join('')}
        </div>
        <div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.8">
          ${usLines.join('<br>') || '資料載入中...'}
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--muted)">
          外資買賣超：${d.foreign_net!=null?`${d.foreign_net>0?'+':''}${d.foreign_net.toLocaleString()} 張`:'待更新'}
        </div>
      </div>

      <div class="card">
        <div class="ct">💰 子彈加碼建議</div>
        <div class="brows">
          ${bullets.map(b=>`
          <div class="brow ${b.active?'bact':''}">
            ${b.pct
              ?`<span class="bptag" style="background:rgba(245,166,35,0.1);color:${ptc[b.pct]};border:1px solid rgba(245,166,35,0.2)">${b.pct}</span>`
              :`<span class="bptag" style="background:rgba(107,127,153,0.1);color:var(--muted);border:1px solid var(--border)">—</span>`}
            <div>
              <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:2px">${b.range}</div>
              <div class="bdesc">${b.action}</div>
            </div>
            ${b.active?'<span style="margin-left:auto;font-size:16px">👈</span>':''}
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- 回測機率預測 -->
    <div class="card" style="margin-bottom:14px">
      <div class="ct">🔭 近期回測機率預測</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap">
        <div style="text-align:center;flex-shrink:0">
          <div style="font-size:36px;line-height:1">${pred.emoji}</div>
          <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${pred.score>=70?'var(--red)':pred.score>=45?'var(--yellow)':'var(--green)'}">${pred.score}<small style="font-size:11px;color:var(--muted)">/100</small></div>
          <div style="font-size:11px;color:var(--muted)">回測機率</div>
        </div>
        <div style="flex:1;min-width:150px">
          <div style="font-size:13px;font-weight:700;margin-bottom:4px">機率等級：<span style="color:${pred.score>=70?'var(--red)':pred.score>=45?'var(--yellow)':'var(--green)'}">${pred.level}</span></div>
          <div style="font-size:13px;margin-bottom:8px">可能幅度：<span style="font-family:var(--mono);font-weight:700">${pred.range}</span></div>
          <div style="font-size:12px;color:var(--muted);padding:8px 10px;border-radius:6px;border-left:3px solid ${pred.score>=70?'var(--red)':pred.score>=45?'var(--yellow)':'var(--green)'};background:rgba(255,255,255,0.03)">${pred.advice}</div>
        </div>
      </div>
      <div style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;font-family:var(--mono)">評估依據</div>
      ${pred.signals?.length?pred.signals.map(s=>`<span class="stag">${s}</span>`).join(''):'<span style="color:var(--muted);font-size:12px">目前無過熱訊號，市場相對健康</span>'}
      <div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.7;padding-top:8px;border-top:1px solid var(--border)">
        ⚠️ 統計機率，不保證一定發生。回測機率高代表應備妥子彈，仍需等真實觸發門檻（-8%/-15%/-20%）才行動。
      </div>
    </div>

    <!-- 子彈閒置狀況 -->
    <div class="card" style="margin-bottom:14px">
      <div class="ct">⏱ 子彈閒置狀況</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
        <div style="font-size:30px">${idle.emoji}</div>
        <div>
          <div style="font-size:14px;font-weight:700">${idle.months} 個月未觸發加碼門檻</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">上次觸發：${idle.last_date||'--'}</div>
        </div>
      </div>
      <div class="itrack"><div style="height:100%;border-radius:4px;background:${idleColor};width:${idleBar}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-family:var(--mono)">
        ${idle.months}/12 個月
        ${idle.months>=6?`<span style="margin-left:8px;color:${idle.months>=12?'var(--red)':'var(--yellow)'}">▲ 建議行動</span>`:''}
      </div>
      <div style="font-size:13px;padding:10px;border-radius:8px;border-left:3px solid ${idleColor};background:rgba(255,255,255,0.03)">
        ${idle.advice}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted)">
        ※ 閒置計時以「0050實際觸發加碼門檻（-8%）」為準
      </div>
    </div>
  `;
}

// ── 主流程 ──
async function load(){
  document.getElementById('main').innerHTML=`<div class="loading"><div class="lspin"></div><div class="ltxt">載入市場資料中...</div></div>`;
  try{
    const r = await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    render(data);
    const upd = data.updated?new Date(data.updated):new Date();
    document.getElementById('utime').textContent=`更新：${upd.toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('mstat').textContent=data.market_open?'盤中即時':'休市・最後收盤';
    document.getElementById('mstat').style.color=data.market_open?'var(--green)':'var(--muted)';
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="err">⚠️ 無法載入資料<br><small style="color:var(--muted)">${e.message}</small><br><br>可能原因：Bot 尚未推送資料，請稍後再試<br>或輸入 /report 讓 Bot 立即更新</div>`;
    document.getElementById('utime').textContent='載入失敗';
  }
}

load();
setInterval(load, 5*60*1000);
</script>
</body>
</html>
